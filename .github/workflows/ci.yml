name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Lint: ruff 是硬性门槛；mypy 当前是 advisory（项目里仍有 pre-existing 错）
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check src tests

      - name: ruff format --check
        run: ruff format --check src tests

  # ---------------------------------------------------------------------------
  # Type check: advisory only — 项目里 mypy strict 仍有 ~100 pre-existing 错
  # 等后续逐文件清理后改回 blocking。当前失败时 PR 仍可合并（带 warning）。
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type check (mypy, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: mypy (strict, advisory)
        run: mypy src | tee mypy.log || true
        # tee 让日志在 step summary 显示

      - name: Summarize mypy errors
        if: always()
        run: |
          if [ -f mypy.log ]; then
            errors=$(grep -c "error:" mypy.log || echo "0")
            echo "::warning::mypy reported $errors errors (advisory, not blocking)"
          fi

  # ---------------------------------------------------------------------------
  # Test: pytest + coverage threshold，矩阵 3.10 / 3.11 / 3.12
  # UI 测试 (tests/ui) 在没装 PySide6 时由 conftest 自动 skip
  # ---------------------------------------------------------------------------
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        # 只装 dev（不带 [gui]）— 让 tests/ui 自动 skip，CI 跑得快
        run: pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: |
          pytest \
            --cov=points_v2 \
            --cov-report=xml \
            --cov-report=term \
            --cov-fail-under=60 \
            -v

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  # ---------------------------------------------------------------------------
  # Migration integration: 在 Linux CI 上跑真 v5.9 → v2 迁移
  # 用了 sample 数据（sample/v59/ 仓库内），不依赖本地 v5.9 项目
  # ---------------------------------------------------------------------------
  migration:
    name: Migration integration (v5.9 → v2)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run migration on sample v5.9 data
        run: |
          if [ -d "sample/v59" ]; then
            tmp_dir=$(mktemp -d)
            python -m points_v2.migrations.from_v5_9 \
              --source sample/v59 \
              --target "$tmp_dir"
            echo "Migrated sample to $tmp_dir"
            cat "$tmp_dir/migration_report.json" || true
          else
            echo "::notice::sample/v59 not present; skipping migration integration"
          fi
