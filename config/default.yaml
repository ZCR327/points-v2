# default.yaml — 基础默认值
# 加载顺序：default.yaml → {APP_ENV}.yaml → 环境变量（最高优先级，前缀 POINTS_V2_）

app:
  name: "智能回收社 积分系统"
  version: "2.0.0"
  env: development
  debug: true

paths:
  data_dir: "data"
  log_dir: "logs"
  backup_dir: "data/backups"

logging:
  level: INFO
  rotation: "10 MB"
  retention: "30 days"
  console: true

database:
  type: json               # 未来可换 sqlite
  backup_interval_minutes: 30

api:
  host: "127.0.0.1"
  port: 8765
  cors_origins: []

security:
  password_min_length: 8
  max_failed_logins: 5
  lock_duration_minutes: 15
  session_ttl_hours: 24

points:
  min_balance_warning: 10
  max_transfer_per_day: 10000

ui:
  theme: default
  language: zh_CN
